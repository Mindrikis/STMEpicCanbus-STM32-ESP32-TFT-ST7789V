; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = black_f407vg

[env:black_f407vg]
platform = ststm32
board = black_f407vg
framework = arduino
upload_protocol = dfu
build_flags =
    ; Match rusEFI Primary CAN → Bitrate (e.g. 500 kbps in your uaEFI tune).
    -D CAN_BITRATE_KBPS=500
    ; Dash speed for ESP32 (`V`), trip distance, fuel, accel: always from ECU VSS. Optional slow blend toward GPS SOG when fix is good:
    ;   -D DASH_GPS_SPEED_BLEND_PERMILLE=40
    ; (40 ≈ 4% GPS per 200 ms telemetry tick; 0 = ECU only — default in main.cpp)
    ; If CAN transceiver/bus is missing, still run loop() so dash UART (PB10/PB11) talks to ESP32.
    -D CAN_ALLOW_BOOT_WITHOUT_BUS=1
    ; Must match rusEFI TunerStudio "CAN ID - get_var / function calls" (ecuCanId). Mega EPIC default was 1.
    -D RUSEFI_EPIC_ECU_CAN_ID=1
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
monitor_speed = 115200
