; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; If omitted, every [env] in this file is built+uploaded in sequence (e.g. nodemcu-32s then nodemcu-32s-slow).
[platformio]
default_envs = nodemcu-32s
; Cursor / clangd / VS Code C++: regenerate after changing env, lib_deps, build_flags, or project path:
;   compiledb.cmd   (or: pio run -t compiledb)
; writes compile_commands.json (local only; gitignored — embeds this folder path).

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
upload_speed = 115200
monitor_speed = 115200
; Upload dies mid-flash (“chip stopped responding” / StopIteration): usually wiring or power, not sketch size.
; - Disconnect the gateway (STM32/Mega) from GPIO25/GPIO26 (or power it off) so nothing drives ESP32 UART2 during flash.
; - Use a short USB cable with data lines; avoid hubs; give the board stable 3V3 (TFT backlight can draw a lot—try BL disconnected for upload).
; - Bootloader: hold BOOT, tap EN/RESET, release BOOT; upload while ROM loader is waiting.
; - If it still fails: build in env `nodemcu-32s-slow` (below) or try another COM port / PC USB socket.
; Anything pulling GPIO0 low or GPIO2 high at boot can block the ROM bootloader.
;
; WiFi / Bluetooth: `framework = arduino` uses prebuilt IDF libs — project
; `sdkconfig.defaults` is not applied. Runtime: `dash_disable_unused_wireless()`
; in `src/main.cpp` releases Bluetooth heap only — including Arduino `WiFi` or
; `esp_wifi.h` here pulled the full WiFi stack and overflowed DRAM on this build.
; WiFi is still unused (no WiFi.begin / esp_wifi_init). To drop WiFi/BT from the
; binary, use ESP-IDF (or hybrid arduino+espidf) and CMake SDKCONFIG_DEFAULTS →
; `sdkconfig.defaults` (PlatformIO “sdkconfig Configuration”).
build_flags =
  ; -D DASH_LINK_SNIFFER=1
  ;   Mirror gateway bytes from GPIO25/26 (Serial2) to USB Serial — use to verify STM32->ESP32 wiring.
  ; Coolant + brake fluid strip + buzzer (GPIO 13/14): enabled by default in firmware. Add `-D DASH_FLUID_LEVEL_WARNINGS=0` here if sensors are unwired / bench testing.
  -DLV_CONF_SKIP
  -DTOUCH_CS=-1
  -DUSER_SETUP_LOADED=1
  -DST7789_2_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MISO=19
  -DTFT_MOSI=23
  -DTFT_SCLK=18
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=4
  ; ST7789: 27 MHz is safer if you see SPI glitches; use 40000000 if wiring is very short.
  -DSPI_FREQUENCY=27000000
  -DTFT_RGB_ORDER=TFT_BGR
  -DLV_FONT_MONTSERRAT_18=1
  -DLV_FONT_MONTSERRAT_20=1
  -DLV_FONT_MONTSERRAT_24=1
  -DLV_FONT_MONTSERRAT_48=1
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.0
  lvgl/lvgl @ ^9.2.0

; Fallback when default upload stalls partway: slower baud + ROM-only (no stub).
[env:nodemcu-32s-slow]
extends = env:nodemcu-32s
upload_speed = 57600
upload_flags =
  --no-stub
